language: 'go'
layer: 'application'
tags:
  - 'cli'
  - 'go'

project:
  title: 'imgcli'
  description: 'CLI for building disk image artifacts from configuration.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

workspace:
  inheritedTasks:
    include: []

toolchains:
  default: 'go'

fileGroups:
  go-config:
    - 'go.mod'
    - 'go.sum'
  go-sources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
  lint-config:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'

tasks:
  build:
    command: 'go build -o bin/imgcli ./cmd/imgcli'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
    outputs:
      - 'bin/imgcli'

  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
      - '@group(lint-config)'
    options:
      cache: false

  lint:
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
      - '@group(lint-config)'
    options:
      cache: false

  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
    options:
      cache: false
      runInCI: true
