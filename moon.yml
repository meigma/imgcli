language: 'go'
layer: 'application'
tags:
  - 'cli'
  - 'go'

project:
  title: 'imgcli'
  description: 'CLI for building disk image artifacts from configuration.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

workspace:
  inheritedTasks:
    include: []

toolchains:
  default: 'go'

fileGroups:
  go-config:
    - 'go.mod'
    - 'go.sum'
    - 'go.work'
    - 'go.work.sum'
  go-sources:
    - 'cmd/**/*.go'
    - 'internal/**/*.go'
  schema-config:
    - '.prototools'
    - '.moon/proto/cue.toml'
    - 'schemas/go.mod'
    - 'schemas/go.sum'
    - 'schemas/cue.mod/**/*.cue'
  schema-go-sources:
    - 'schemas/**/*.go'
  schema-sources:
    - 'schemas/**/*.cue'
  lint-config:
    - '.golangci.yml'
    - '.prototools'
    - '.moon/proto/golangci-lint.toml'

tasks:
  build:
    deps:
      - 'root:schemas-generate-check'
    command: 'go build -o bin/imgcli ./cmd/imgcli'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
    outputs:
      - 'bin/imgcli'

  format:
    command: 'proto run golangci-lint -- fmt --config .golangci.yml --diff'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
      - '@group(lint-config)'
    options:
      cache: false

  lint:
    deps:
      - 'root:schemas-generate-check'
    command: 'proto run golangci-lint -- run --config .golangci.yml ./... --show-stats=false'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
      - '@group(lint-config)'
    options:
      cache: false

  test:
    deps:
      - 'root:schemas-generate-check'
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'

  test-integration:
    deps:
      - 'root:schemas-generate-check'
    command: 'go test -count 1 -tags integration ./internal/integration'
    toolchains: ['go']
    inputs:
      - '@group(go-config)'
      - '@group(go-sources)'
    options:
      cache: false

  schemas-mod-check:
    script: 'cd schemas && proto run cue -- mod tidy --check'
    inputs:
      - '@group(schema-config)'
      - '@group(schema-sources)'
    options:
      cache: false

  schemas-vet:
    script: 'cd schemas && proto run cue -- vet -c=false ./...'
    inputs:
      - '@group(schema-config)'
      - '@group(schema-sources)'
    options:
      cache: false

  schemas-generate:
    script: 'cd schemas && proto run cue -- exp gengotypes . ./core ./providers/... && find cue.mod/gen -name "*.go" -type f -delete && gofmt -w $(find . -path ./cue.mod -prune -o -name "*.go" -type f -print)'
    inputs:
      - '@group(schema-config)'
      - '@group(schema-sources)'
    outputs:
      - 'schemas/**/*.go'
    options:
      cache: false

  schemas-generate-check:
    script: 'cd schemas && proto run cue -- exp gengotypes . ./core ./providers/... && find cue.mod/gen -name "*.go" -type f -delete && gofmt -w $(find . -path ./cue.mod -prune -o -name "*.go" -type f -print) && git -C .. diff --exit-code -- "schemas/**/*.go"'
    inputs:
      - '@group(schema-config)'
      - '@group(schema-sources)'
      - '@group(schema-go-sources)'
    options:
      cache: false

  schemas-test:
    deps:
      - 'root:schemas-generate-check'
    script: 'cd schemas && go test ./...'
    toolchains: ['go']
    inputs:
      - '@group(schema-config)'
      - '@group(schema-go-sources)'
    options:
      cache: false

  check:
    deps:
      - 'root:format'
      - 'root:lint'
      - 'root:build'
      - 'root:test'
      - 'root:test-integration'
      - 'root:schemas-mod-check'
      - 'root:schemas-vet'
      - 'root:schemas-test'
    options:
      cache: false
      runInCI: true
