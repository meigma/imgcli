all: false
force-file-write: true
formatter: goimports
log-level: info
template: testify
packages:
  github.com/meigma/imgcli/internal/cache:
    config:
      dir: internal/cache/mocks
      filename: service.go
      pkgname: mocks
      structname: MockService
    interfaces:
      Service:
  github.com/meigma/imgcli/internal/publish:
    config:
      dir: internal/publish/mocks
      filename: uploads_client.go
      pkgname: mocks
      structname: MockUploadsClient
    interfaces:
      UploadsClient:
      CatalogClient:
        config:
          filename: catalog_client.go
          structname: MockCatalogClient
